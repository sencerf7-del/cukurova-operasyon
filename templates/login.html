<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Çukurova Havalimanı Admin Girişi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #001f4d; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; color: #333; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 350px; text-align: center; border-top: 6px solid #ffcc00; }
        h2 { color: #003366; margin-bottom: 5px; font-size: 22px; }
        h3 { color: #555; margin-top: 0; font-size: 14px; margin-bottom: 25px; }
        input[type="password"] { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }
        input[type="password"]:focus { border-color: #003366; outline: none; }
        .btn-submit { background-color: #003366; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: #001f4d; }
        .error-msg { color: #dc3545; font-weight: bold; font-size: 14px; margin-top: 10px; }
        .info-tag { font-size: 12px; color: #888; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🔒 Admin Giriş Paneli</h2>
        <h3>Çukurova Meydan Yönetimi</h3>
        
        <form method="POST" action="/admin-panel">
            <input type="password" name="sifre" placeholder="Admin Yetki Şifresi" required autofocus>
            <button type="submit" class="btn-submit">Yetkileri Aç</button>
        </form>

        {% if hata %}
            <div class="error-msg">❌ {{ hata }}</div>
        {% endif %}

        <div class="info-tag">
            * Sadece Excel yükleme ve sistemi sıfırlama yetkilerini açmak için şef şifresini giriniz.
        </div>
    </div>

</body>
</html>
